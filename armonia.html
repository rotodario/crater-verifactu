<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armonía de Colores - Ambient Light Clásico</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #2c3e50, #bdc3c7);
      color: #fff;
      text-align: center;
    }
    h1 {
      margin-top: 40px;
      font-size: 2.5em;
      font-weight: 500;
    }
    #controls {
      margin: 20px auto;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    #controls label {
      font-size: 1.2em;
    }
    #controls input[type="color"] {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #controls button {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background-color: #3498db;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
    }
    #controls button:hover {
      background-color: #2980b9;
      transform: scale(1.05);
    }
    #layout {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    #leftSwatches, #rightSwatches {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 120px;
    }
    .color-swatch-container {
      cursor: pointer;
      width: 100px;
      margin: 0 auto;
      transition: transform 0.2s ease;
    }
    .color-swatch-container:hover {
      transform: scale(1.05);
    }
    .color-swatch {
      width: 100px;
      height: 60px;
      border: 2px solid #000;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    canvas {
      border: 2px solid #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    }
    @media (max-width: 768px) {
      #layout { flex-direction: column; }
      #simulationCanvas {
        order: 1;
        margin: 0 auto;
        width: 300px;
        height: 300px;
      }
      #leftSwatches,
      #rightSwatches {
        order: 2;
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
      }
      .color-swatch-container { margin: 5px; }
    }
  </style>
</head>
<body>
  <h1>Armonía Cromática</h1>
  <div id="controls">
    <label for="baseColorPicker">Color Base:</label>
    <input type="color" id="baseColorPicker" value="#ff0000">
    <button id="generateColors">Generar Colores</button>
    <button id="toggleRotation">Pausar Rotación</button>
  </div>
  <div id="layout">
    <div id="leftSwatches"></div>
    <canvas id="simulationCanvas" width="500" height="500"></canvas>
    <div id="rightSwatches"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.1.0/chroma.min.js"></script>
  <script>
    let simulationVariants = [];
    let rotationAngle = 0;
    const baseRotationSpeed = 0.005;
    let orbitProgress = 1;
    const orbitRadius = 200;
    let ambientSurface = null;
    let ambientEffectProgress = 1;
    const ambientThickness = 100;
    let rotationPaused = false;

    // Variables para el modo de movimiento y transición suave
    let currentMovementMode = 0;
    let prevMovementMode = 0;
    let movementTransitionBlend = 1; // 1: sin transición, 0: inicio de transición
    const movementModeNames = ["Círculos", "Figura 8", "Círculos Simétricos", "Movimiento Tilt"];
    const transitionDuration = 1.0; // duración de la transición en segundos
    let lastTimestamp = null;

    function getVariants(baseHex) {
      let base = chroma(baseHex);
      let hsl = base.hsl();
      const variants = [
        { label: 'Original', color: base },
        { label: 'Complementario', color: base.set('hsl.h', hsl[0] + 180) },
        { label: 'Triádico 1', color: base.set('hsl.h', hsl[0] + 120) },
        { label: 'Triádico 2', color: base.set('hsl.h', hsl[0] - 120) },
        { label: 'Análogo 1', color: base.set('hsl.h', hsl[0] + 30) },
        { label: 'Análogo 2', color: base.set('hsl.h', hsl[0] - 30) }
      ];
      const pastel = variants.map(v => ({
        label: v.label + ' Pastel',
        color: chroma(v.color).set('hsl.s', Math.max(0, v.color.get('hsl.s') - 0.3))
                           .set('hsl.l', Math.min(1, v.color.get('hsl.l') + 0.3))
      }));
      return variants.concat(pastel);
    }

    // Se ha modificado drawBeam para usar una opacidad menor (60% en este ejemplo)
    function drawBeam(ctx, color, center, radius) {
      let semiTransparent = chroma(color).alpha(0.6).css();
      let gradient = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, radius);
      gradient.addColorStop(0, semiTransparent);
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.shadowBlur = 20;
      ctx.shadowColor = semiTransparent;
      ctx.beginPath();
      ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function createAmbientLightSurface(color, thickness) {
      const width = 500, height = 500;
      const offCanvas = document.createElement('canvas');
      offCanvas.width = width;
      offCanvas.height = height;
      const offCtx = offCanvas.getContext('2d');
      const imageData = offCtx.createImageData(width, height);
      const data = imageData.data;
      const rgb = color.rgb();
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const index = (y * width + x) * 4;
          const distEdge = Math.min(x, width - x - 1, y, height - y - 1);
          let alpha = distEdge < thickness ? 255 * (1 - distEdge / thickness) : 0;
          data[index] = rgb[0];
          data[index + 1] = rgb[1];
          data[index + 2] = rgb[2];
          data[index + 3] = alpha;
        }
      }
      offCtx.putImageData(imageData, 0, 0);
      return offCanvas;
    }

    // Calcula la posición del haz según el modo de movimiento
    function computeBeamPosition(mode, i, rotationAngle, effectiveOrbitRadius, center, orbitCount) {
      let angle = rotationAngle + (2 * Math.PI * i / orbitCount);
      switch(mode) {
        case 0: // Círculos
          return {
            x: center.x + effectiveOrbitRadius * Math.cos(angle),
            y: center.y + effectiveOrbitRadius * Math.sin(angle)
          };
        case 1: // Figura 8
          return {
            x: center.x + effectiveOrbitRadius * Math.cos(angle),
            y: center.y + (effectiveOrbitRadius * Math.sin(2 * angle)) / 2
          };
        case 2: // Círculos Simétricos (alternando dirección)
          if(i % 2 === 0) {
            return {
              x: center.x + effectiveOrbitRadius * Math.cos(angle),
              y: center.y + effectiveOrbitRadius * Math.sin(angle)
            };
          } else {
            return {
              x: center.x + effectiveOrbitRadius * Math.cos(-angle),
              y: center.y + effectiveOrbitRadius * Math.sin(-angle)
            };
          }
        case 3: // Movimiento Tilt: cada haz se acerca al centro y vuelve individualmente
          let phase = rotationAngle + (i * Math.PI / orbitCount);
          let factor = (Math.cos(phase) + 1) / 2;
          return {
            x: center.x + effectiveOrbitRadius * Math.cos(angle) * factor,
            y: center.y + effectiveOrbitRadius * Math.sin(angle) * factor
          };
        default:
          return {
            x: center.x + effectiveOrbitRadius * Math.cos(angle),
            y: center.y + effectiveOrbitRadius * Math.sin(angle)
          };
      }
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function simulate(timestamp) {
      if (!lastTimestamp) lastTimestamp = timestamp;
      const delta = (timestamp - lastTimestamp) / 1000;
      lastTimestamp = timestamp;
      if (movementTransitionBlend < 1) {
        movementTransitionBlend += delta / transitionDuration;
        if (movementTransitionBlend > 1) movementTransitionBlend = 1;
      }
      const canvas = document.getElementById('simulationCanvas');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (ambientSurface !== null) {
        ctx.globalAlpha = ambientEffectProgress;
        ctx.drawImage(ambientSurface, 0, 0);
        ctx.globalAlpha = 1;
        if (ambientEffectProgress < 1) ambientEffectProgress += 0.02;
      }

      const center = { x: canvas.width / 2, y: canvas.height / 2 };
      if (simulationVariants.length > 0) {
        drawBeam(ctx, simulationVariants[0].color.css(), center, 200);
      }

      const effectiveOrbitRadius = orbitRadius * orbitProgress;
      const orbitVariants = simulationVariants.slice(1);
      const orbitCount = orbitVariants.length;

      orbitVariants.forEach((variant, i) => {
        let pos;
        if (movementTransitionBlend < 1) {
          let posOld = computeBeamPosition(prevMovementMode, i, rotationAngle, effectiveOrbitRadius, center, orbitCount);
          let posNew = computeBeamPosition(currentMovementMode, i, rotationAngle, effectiveOrbitRadius, center, orbitCount);
          pos = {
            x: lerp(posOld.x, posNew.x, movementTransitionBlend),
            y: lerp(posOld.y, posNew.y, movementTransitionBlend)
          };
        } else {
          pos = computeBeamPosition(currentMovementMode, i, rotationAngle, effectiveOrbitRadius, center, orbitCount);
        }
        drawBeam(ctx, variant.color.css(), pos, 100);
      });

      if (!rotationPaused) rotationAngle += baseRotationSpeed;
      if (orbitProgress < 0.999) orbitProgress += (1 - orbitProgress) * 0.05;
      else orbitProgress = 1;

      requestAnimationFrame(simulate);
    }

    function updateColorVariants(variants) {
      const leftContainer = document.getElementById('leftSwatches');
      const rightContainer = document.getElementById('rightSwatches');
      leftContainer.innerHTML = '';
      rightContainer.innerHTML = '';
      const leftVariants = variants.slice(0, 6);
      const rightVariants = variants.slice(6, 12);

      leftVariants.forEach((v, index) => {
        const swatchContainer = document.createElement('div');
        swatchContainer.className = 'color-swatch-container';
        swatchContainer.title = v.label;
        swatchContainer.setAttribute('role', 'button');
        swatchContainer.setAttribute('aria-label', `Seleccionar ${v.label}`);

        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = v.color.hex();
        const rgbValues = v.color.rgb();
        swatch.textContent = `RGB (${rgbValues[0]}, ${rgbValues[1]}, ${rgbValues[2]})`;

        swatchContainer.addEventListener('click', () => {
          if (index === 0) simulationVariants = getVariants(document.getElementById('baseColorPicker').value);
          else {
            simulationVariants = [simulationVariants[0]];
            const orbitCount = getVariants(document.getElementById('baseColorPicker').value).length - 1;
            for (let i = 0; i < orbitCount; i++) {
              simulationVariants.push({ label: v.label, color: v.color });
            }
          }
          orbitProgress = 0;
        });

        swatchContainer.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          ambientSurface = createAmbientLightSurface(v.color, ambientThickness);
          ambientEffectProgress = 0;
        });

        swatchContainer.appendChild(swatch);
        leftContainer.appendChild(swatchContainer);
      });

      rightVariants.forEach((v) => {
        const swatchContainer = document.createElement('div');
        swatchContainer.className = 'color-swatch-container';
        swatchContainer.title = v.label;
        swatchContainer.setAttribute('role', 'button');
        swatchContainer.setAttribute('aria-label', `Seleccionar ${v.label}`);

        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = v.color.hex();
        const rgbValues = v.color.rgb();
        swatch.textContent = `RGB (${rgbValues[0]}, ${rgbValues[1]}, ${rgbValues[2]})`;

        swatchContainer.addEventListener('click', () => {
          simulationVariants = [simulationVariants[0]];
          const orbitCount = getVariants(document.getElementById('baseColorPicker').value).length - 1;
          for (let i = 0; i < orbitCount; i++) {
            simulationVariants.push({ label: v.label, color: v.color });
          }
          orbitProgress = 0;
        });

        swatchContainer.addEventListener('contextmenu', (event) => {
          event.preventDefault();
          ambientSurface = createAmbientLightSurface(v.color, ambientThickness);
          ambientEffectProgress = 0;
        });

        swatchContainer.appendChild(swatch);
        rightContainer.appendChild(swatchContainer);
      });
    }

    document.getElementById('generateColors').addEventListener('click', () => {
      const baseColor = document.getElementById('baseColorPicker').value;
      simulationVariants = getVariants(baseColor);
      updateColorVariants(simulationVariants);
    });

    document.getElementById('toggleRotation').addEventListener('click', () => {
      rotationPaused = !rotationPaused;
      document.getElementById('toggleRotation').textContent = rotationPaused ? 'Reanudar Rotación' : 'Pausar Rotación';
    });

    // Al pulsar sobre el canvas se cambia de modo de movimiento con transición suave
    document.getElementById('simulationCanvas').addEventListener('click', () => {
      prevMovementMode = currentMovementMode;
      currentMovementMode = (currentMovementMode + 1) % movementModeNames.length;
      movementTransitionBlend = 0;
    });

    simulationVariants = getVariants(document.getElementById('baseColorPicker').value);
    updateColorVariants(simulationVariants);
    requestAnimationFrame(simulate);
  </script>
</body>
</html>
